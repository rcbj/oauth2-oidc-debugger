name: Deploy Static Site (test.idptools.com)

# Builds the static client content and deploys it to the TEST site
# (test.idptools.com) using the same container image as prod and local runs.
# DEPLOY_ENV=test selects the test bucket / distribution / config.

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Build deploy image
        run: docker build -t idptools-static-deploy -f deploy/Dockerfile .

      - name: Build static content and deploy TEST to S3 + CloudFront
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_REGION=us-west-2 \
            -e DEPLOY_ENV=test \
            idptools-static-deploy
