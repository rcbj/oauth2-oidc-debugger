name: Selenium Tests

on:
  schedule:
    - cron: '0 10 * * *'
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      - name: Install docker-compose
        uses: KengoTODA/actions-setup-docker-compose@v1
        with:
          version: '5.2.0'
      - name: Run Tests with coverage
        run: |
          mkdir -p coverage/frontend/.nyc_output coverage/api
          sudo CONFIG_FILE=./env/docker-tests.js docker compose \
            -f docker-compose-run-tests.yml -f docker-compose-coverage.yml \
            up --build --abort-on-container-exit --exit-code-from tests
      - name: Generate frontend coverage report
        if: always()
        run: |
          sudo CONFIG_FILE=./env/docker-tests.js docker compose \
            -f docker-compose-run-tests.yml -f docker-compose-coverage.yml \
            run --rm --no-deps client \
            npx nyc report --temp-dir /coverage/frontend/.nyc_output \
                           --report-dir /coverage/frontend/report \
                           --reporter=html --reporter=lcov --reporter=text-summary
      - name: Tear down the stack
        if: always()
        run: |
          sudo CONFIG_FILE=./env/docker-tests.js docker compose \
            -f docker-compose-run-tests.yml -f docker-compose-coverage.yml down
      - name: Normalize coverage permissions
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" coverage || true
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 30
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: tests/report/latest
          if-no-files-found: warn
          retention-days: 30








