name: Selenium Tests

on:
  schedule:
    - cron: '0 10 * * *'
  # develop is the head of the deploy chain: this suite runs first, then the
  # Terraform workflow (workflow_run on success), then the test-site deploy.
  push:
    branches: [ master, develop ]
  # Run on PRs targeting master or develop (branches = the PR's base branch).
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:
permissions:
  contents: read

jobs:
  # Plain suite: full battery in containers, no coverage. Wraps
  # ./docker-run-tests.sh, which builds the stack (docker-compose-run-tests.yml),
  # runs the Selenium suite, and always tears the stack down.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      - name: Install docker-compose
        uses: KengoTODA/actions-setup-docker-compose@v1
        with:
          version: '5.2.0'
      # The script's docker_compose() (common/common.sh) invokes compose with
      # sudo itself, so it runs unprivileged here.
      - name: Run Selenium test suite
        run: ./docker-run-tests.sh
      # The tests container writes tests/report as root via a bind mount; hand it
      # back to the runner user before the upload step reads it.
      - name: Normalize report permissions
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" tests/report || true
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: tests/report/latest
          if-no-files-found: warn
          retention-days: 30

  # Coverage suite: same battery WITH frontend (Istanbul) + API (c8) coverage.
  # Wraps ./run-coverage.sh, which layers docker-compose-coverage.yml on top,
  # runs the suite, renders the coverage reports, and tears the stack down.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      - name: Install docker-compose
        uses: KengoTODA/actions-setup-docker-compose@v1
        with:
          version: '5.2.0'
      - name: Run test suite with coverage
        run: ./run-coverage.sh
      # coverage/ and tests/report are written as root inside the containers.
      - name: Normalize coverage permissions
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" coverage tests/report || true
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 30
      # Distinct artifact name from the test job (artifact names must be unique
      # across a workflow run).
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-test-report
          path: tests/report/latest
          if-no-files-found: warn
          retention-days: 30








