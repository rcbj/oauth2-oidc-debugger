name: Terraform

# Runs Terraform inside the same container image used locally
# (infra/terraform-local.sh). State is remote (S3).
#
# Triggers:
#   - push to `develop`  -> automatically `apply` the TEST environment. This
#     fires both when a PR is merged into develop and on direct commits to
#     develop (both are pushes). Mirrors the develop->test convention used by
#     the website-deploy workflows.
#   - workflow_dispatch  -> manual run; choose environment (test|prod) and
#     action (plan|apply), e.g. to apply prod.
#
# Deliberately NOT triggered on pull_request, so untrusted PR content is never
# executed with AWS credentials. Pushes to develop are post-merge (they require
# write access), so running with credentials there is safe.
#
# CI authenticates with static-key secrets (same pattern as the deploy
# pipeline); local runs use your AWS SSO session.

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [test, prod]
        default: test
      action:
        description: "Terraform action"
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  contents: read

# Serialize runs per environment so two applies never overlap (in addition to
# the S3-native state lock). Do not cancel an in-flight apply.
concurrency:
  group: terraform-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'test' }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    # Resolve environment/action from the trigger: a develop push applies test;
    # a manual dispatch uses the chosen inputs.
    env:
      TF_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'test' }}
      TF_ACTION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action || 'apply' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Build terraform image
        run: docker build -t idptools-terraform -f infra/Dockerfile .

      - name: Terraform ${{ env.TF_ACTION }} (${{ env.TF_ENV }})
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_REGION=us-west-2 \
            -e TF_ENV="${TF_ENV}" \
            -e TF_ACTION="${TF_ACTION}" \
            idptools-terraform
