<!--#include file="/partials/header.html"-->

    <div class="container">
<script type="text/javascript" src="/js/encoding_tools.js">
</script>

<p class="encoding-tools-return"><a id="return_link" href="/debugger.html">&larr; Return to debugger</a></p>

<p class="encoding-tools-intro">Encode, decode, checksum, and hash arbitrary values &mdash; all in your browser. <strong>Nothing is stored or sent to a server:</strong> every value stays on this page.</p>

<div class="encoding-tools-grid">

  <!-- ===================== 1. Base64 ===================== -->
  <fieldset id="pane_base64">
    <legend>Base64</legend>

    <div class="et-field">
      <label class="et-has-copy" title="The plain, unencoded value to Base64-encode.">Unencoded value <button type="button" class="et-copy" onclick="return encoding_tools.copyField('b64_unencoded');" title="Copy to clipboard">Copy</button></label>
      <textarea rows="2" id="b64_unencoded" name="b64_unencoded" title="Plain text to Base64-encode. Edit this and click Encode."></textarea>
    </div>
    <div class="et-field">
      <label class="et-has-copy" title="The Base64-encoded form of the value above.">Encoded <button type="button" class="et-copy" onclick="return encoding_tools.copyField('b64_encoded');" title="Copy to clipboard">Copy</button></label>
      <textarea rows="2" id="b64_encoded" name="b64_encoded" title="Base64 text. Edit this and click Decode to recover the plain text."></textarea>
    </div>
    <div class="et-row">
      <input type="submit" value="Encode" onclick="return encoding_tools.base64Encode();" title="Base64-encode the Unencoded value into the Encoded box." />
      <input type="submit" value="Decode" onclick="return encoding_tools.base64Decode();" title="Base64-decode the Encoded value into the Unencoded box." />
    </div>
    <input class="et-status" type="text" id="b64_status" name="b64_status" title="Status / result of the last Base64 operation." readonly />
  </fieldset>

  <!-- ===================== 2. URI Encoding ===================== -->
  <fieldset id="pane_uri">
    <legend>URI Encoding</legend>

    <div class="et-field">
      <label class="et-has-copy" title="The plain, unencoded value to percent-encode for use in a URL.">Unencoded value <button type="button" class="et-copy" onclick="return encoding_tools.copyField('uri_unencoded');" title="Copy to clipboard">Copy</button></label>
      <textarea rows="2" id="uri_unencoded" name="uri_unencoded" title="Plain text to percent-encode. Edit this and click Encode."></textarea>
    </div>
    <div class="et-field">
      <label class="et-has-copy" title="The percent-encoded (URI component) form of the value above.">Encoded <button type="button" class="et-copy" onclick="return encoding_tools.copyField('uri_encoded');" title="Copy to clipboard">Copy</button></label>
      <textarea rows="2" id="uri_encoded" name="uri_encoded" title="Percent-encoded text. Edit this and click Decode."></textarea>
    </div>
    <div class="et-row">
      <input type="submit" value="Encode" onclick="return encoding_tools.uriEncode();" title="URI-encode the Unencoded value into the Encoded box." />
      <input type="submit" value="Decode" onclick="return encoding_tools.uriDecode();" title="URI-decode the Encoded value into the Unencoded box." />
    </div>
    <input class="et-status" type="text" id="uri_status" name="uri_status" title="Status / result of the last URI operation." readonly />
  </fieldset>

  <!-- ===================== 3. Checksum (one-way) ===================== -->
  <fieldset id="pane_checksum">
    <legend>Checksum (CRC-32)</legend>

    <div class="et-field">
      <label class="et-has-copy" title="The value to run the CRC-32 checksum over.">Unencoded value <button type="button" class="et-copy" onclick="return encoding_tools.copyField('checksum_unencoded');" title="Copy to clipboard">Copy</button></label>
      <textarea rows="2" id="checksum_unencoded" name="checksum_unencoded" title="Input to checksum. Edit this and click Encode."></textarea>
    </div>
    <div class="et-field">
      <label class="et-has-copy" title="The CRC-32 checksum (8 hex digits). A checksum is one-way &mdash; it cannot be decoded.">Encoded <button type="button" class="et-copy" onclick="return encoding_tools.copyField('checksum_encoded');" title="Copy to clipboard">Copy</button></label>
      <textarea rows="2" id="checksum_encoded" name="checksum_encoded" title="CRC-32 checksum (8 hex digits). One-way — cannot be decoded." readonly></textarea>
    </div>
    <div class="et-row">
      <input type="submit" value="Encode" onclick="return encoding_tools.checksum();" title="Compute the CRC-32 checksum of the Unencoded value." />
    </div>
    <input class="et-status" type="text" id="checksum_status" name="checksum_status" title="Status / result of the last checksum operation." readonly />
  </fieldset>

  <!-- ===================== 4. SHA Hashing ===================== -->
  <fieldset id="pane_sha">
    <legend>SHA Hashing</legend>

    <div class="et-field">
      <label class="et-has-copy" title="The value to hash with the selected SHA algorithm.">Unencoded value <button type="button" class="et-copy" onclick="return encoding_tools.copyField('sha_unencoded');" title="Copy to clipboard">Copy</button></label>
      <textarea rows="2" id="sha_unencoded" name="sha_unencoded" title="Input to hash. Edit this, pick a size, and click Encode."></textarea>
    </div>
    <div class="et-field">
      <label class="et-has-copy" title="The SHA digest (hex). A hash is one-way &mdash; it cannot be decoded.">Encoded <button type="button" class="et-copy" onclick="return encoding_tools.copyField('sha_encoded');" title="Copy to clipboard">Copy</button></label>
      <textarea rows="2" id="sha_encoded" name="sha_encoded" title="SHA digest in hex. One-way — cannot be decoded." readonly></textarea>
    </div>
    <div class="et-row">
      <select class="et-grow" id="sha_size" name="sha_size" title="SHA algorithm / digest size.">
        <option value="SHA-256" selected="selected">SHA-256</option>
        <option value="SHA-1">SHA-1</option>
        <option value="SHA-384">SHA-384</option>
        <option value="SHA-512">SHA-512</option>
      </select>
      <input type="submit" value="Encode" onclick="return encoding_tools.shaHash();" title="Compute the selected SHA digest of the Unencoded value." />
    </div>
    <input class="et-status" type="text" id="sha_status" name="sha_status" title="Status / result of the last hash operation." readonly />
  </fieldset>

</div>
