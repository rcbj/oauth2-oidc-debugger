  <script>
  // The brand logo returns to the home page of the debugger family the user is
  // currently in: SAML pages (saml_*) -> the SAML home, WS-Trust pages
  // (wstrust_*) -> the WS-Trust home, everything else -> the OAuth2/OIDC home.
  // The "Home" nav link (above) goes to the landing page (index.html) so the
  // user can switch protocols.
  (function () {
    var logo = document.getElementById('brand_logo');
    if (!logo) return;
    var p = window.location.pathname;
    var href = '/debugger.html';
    if (p.indexOf('/saml_') === 0) href = '/saml_tools.html';
    else if (p.indexOf('/wstrust_') === 0) href = '/wstrust_tools.html';
    logo.setAttribute('href', href);
  })();
  </script>
