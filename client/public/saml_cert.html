<div class="header_debugger">
<!--#include file="/partials/header.html"-->

    <div class="container">
<script type="text/javascript" src="/js/saml_cert.js">
</script>

<p class="saml-return"><a id="return_link" href="/saml_tools.html">&larr; Return to SAML Test Tools</a></p>

<p class="saml-intro">Full details of the IdP's <strong>signer certificate</strong> (from the metadata's <code>KeyDescriptor[use=signing]</code>). Paste any certificate below (PEM or bare base64 DER) and click Parse.</p>

<fieldset class="saml-pane" id="pane_cert_input">
  <legend>Certificate</legend>
  <div class="saml-field">
    <label class="saml-has-copy" title="Certificate in PEM or bare base64 DER form.">Certificate <button type="button" class="saml-copy" onclick="return saml_cert.copyField('saml_cert_input');">Copy</button></label>
    <textarea rows="6" id="saml_cert_input" name="saml_cert_input"></textarea>
  </div>
  <div class="saml-row">
    <input type="button" class="saml-btn" value="Parse" onclick="return saml_cert.parseCert();" title="Parse and display the certificate details." />
    <input class="saml-status saml-grow" type="text" id="saml_cert_status" name="saml_cert_status" readonly />
  </div>
</fieldset>

<fieldset class="saml-pane" id="pane_cert_details">
  <legend>Details</legend>
  <div id="saml_cert_details">&nbsp;</div>
</fieldset>
