#version: '3'
services:
  postgres:
    image: postgres:18
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
      # postgres:18 refuses to start on a data dir initialized by an older
      # major version. Initialize into a fresh subdirectory of the volume so
      # the upgrade starts cleanly (test data is disposable and recreated each
      # run); any legacy PG17 files at the volume root are ignored.
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: pg_isready
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 45s
    ports:
      - 5432:5432
    networks:
      - keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command: ["start-dev"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: keycloak
      KEYCLOAK_ADMIN_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
    hostname: keycloak
    ports:
      - "8080:8080"
    # Probe /health/ready on the management port and require "UP". Well-formed
    # HTTP/1.0 request via bash /dev/tcp (no curl in the image); generous
    # start_period for a cold first start on a fresh image + DB.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 || exit 1; printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3; grep -q 'UP' <&3"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 150s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - keycloak
  api:
    container_name: api
    image: rcbj/api
    environment:
      - CONFIG_FILE=./env/docker-tests.js
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        CONFIG_FILE: ${CONFIG_FILE}
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: curl -X GET http://localhost:4000
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - keycloak
    ports:
      - 4000:4000
  client:
    container_name: client
    image: rcbj/client
    environment:
      - CONFIG_FILE=./env/docker-tests.js
    build:
      context: .
      dockerfile: client/Dockerfile 
      args:
        CONFIG_FILE: ${CONFIG_FILE}
    healthcheck:
      test: curl -X GET http://localhost:3000
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak
    ports:
      - 3000:3000
  tests:
    container_name: tests
    image: rcbj/test
    # Chrome crashes tabs on heavy pages when limited to Docker's default 64MB
    # /dev/shm. The tests also pass --disable-dev-shm-usage; this raises the cap
    # as a belt-and-suspenders mitigation.
    shm_size: '2gb'
    build:
      context: .
      dockerfile: tests/Dockerfile
    # Persist the generated report/logs to the host (gitignored).
    volumes:
      - ./tests/report:/usr/src/app/report
    depends_on:
      client:
        condition: service_healthy
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
     - keycloak

volumes:
  postgres_data:

networks:
  keycloak:
    driver: bridge
