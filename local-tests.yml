# Compose format 2.4: docker-compose (v1) honors `depends_on: condition:
# service_healthy` only in 2.x files. In v3 that condition is silently ignored
# (start-order only), which lets Keycloak start before Postgres is accepting
# connections and crash with "Connection to localhost:5432 refused".
version: '2.4'
services:
  postgres:
    image: postgres:18
    hostname: postgres
    network_mode: "host" 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
      # postgres:18 refuses to start on a data dir initialized by an older
      # major version. Initialize into a fresh subdirectory of the volume so
      # the upgrade starts cleanly (test data is disposable and recreated each
      # run); any legacy PG17 files at the volume root are ignored.
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: pg_isready
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 45s
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command: ["start-dev"]
    hostname: keycloak
    network_mode: "host"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://localhost:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: keycloak
      KEYCLOAK_ADMIN_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
    # Probe the management port's /health/ready and require an "UP" status. Uses
    # bash /dev/tcp (no curl/wget in the Keycloak image). A well-formed HTTP/1.0
    # request (blank line terminates it; server closes the connection) — the
    # previous probe sent an incomplete request line and an inline '#' comment
    # (once the YAML lines joined) commented out the UP check, so it only tested
    # that the port was open.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 || exit 1; printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3; grep -q 'UP' <&3"]
      interval: 10s
      timeout: 10s
      retries: 20
      # First start of a freshly-pulled image on a fresh Postgres DB runs schema
      # creation and can take well over a minute, so allow a generous window.
      start_period: 150s
    depends_on:
      postgres:
        condition: service_healthy
  api:
    container_name: api
    hostname: api
    image: rcbj/api
    network_mode: "host"
    environment:
      - CONFIG_FILE=./env/local.js
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        CONFIG_FILE: ${CONFIG_FILE}
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: curl -X GET http://localhost:4000
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  client:
    container_name: client
    hostname: client
    image: rcbj/client
    network_mode: "host"
    environment:
      - CONFIG_FILE=./env/local.js
    build:
      context: .
      dockerfile: client/Dockerfile 
      args:
        CONFIG_FILE: ${CONFIG_FILE}
    healthcheck:
      test: curl -X GET http://localhost:3000
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
     keycloak:
        condition: service_healthy

volumes:
  postgres_data:
