# Runs the Selenium suite against a DEPLOYED debugger site (default:
# https://test.idptools.com) while talking to a throwaway Keycloak spun up
# locally. Same idea as docker-compose-run-tests.yml, but the debugger under
# test is the hosted site instead of a containerized client — only Keycloak and
# the test runner are started here.
#
# HOST NETWORKING is required (not the bridge network the containerized suite
# uses): the browser drives the public HTTPS site and must call the local
# Keycloak from that HTTPS page. Chrome treats http://localhost (loopback) as
# potentially-trustworthy and exempt from mixed-content / private-network
# blocking, but a private-IP host (e.g. a bridge service name like
# "keycloak:8080") is blocked. So both containers share the host network and
# Keycloak is reached at http://localhost:8080 — the scenario remote-run-tests.sh
# proves. (No user-defined networks or volumes: host net needs neither, and
# Keycloak uses in-memory H2 for throwaway test data.)
#
# Readiness: instead of a Docker healthcheck (flaky under host networking), the
# tests container waits for Keycloak itself (run-tests-in-container.sh waitForKeycloak).
#
# Override the target via the environment:
#   LIVE_DEBUGGER_BASE_URL (default https://test.idptools.com)
#   LIVE_CONFIG_FILE        (default ./env/test-idptools-com.js)
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command: ["start-dev"]
    hostname: keycloak
    network_mode: "host"
    environment:
      KC_HTTP_PORT: "8080"
      KC_BOOTSTRAP_ADMIN_USERNAME: keycloak
      KC_BOOTSTRAP_ADMIN_PASSWORD: keycloak
      KEYCLOAK_ADMIN: keycloak
      KEYCLOAK_ADMIN_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"

  tests:
    image: rcbj/test-live
    build:
      context: .
      dockerfile: tests/Dockerfile
    network_mode: "host"
    environment:
      # Target the deployed site; talk to the local Keycloak over loopback.
      - DEBUGGER_BASE_URL=${LIVE_DEBUGGER_BASE_URL:-https://test.idptools.com}
      - KEYCLOAK_BASE_URL=http://localhost:8080
      - KEYCLOAK_LOCALHOST_BASE_URL=http://localhost:8080
      - CONFIG_FILE=${LIVE_CONFIG_FILE:-./env/test-idptools-com.js}
      # The deployed site is backend-less: the HTTPS page can't fetch the local
      # http Keycloak descriptor cross-origin (CORS). Download it and have the
      # SAML tests UPLOAD it from a file instead (see common.sh).
      - SAML_METADATA_UPLOAD=1
      # SAML config for a deployed, BACKENDLESS target. These MIRROR the
      # non-localhost branch of remote-run-tests.sh; without them the container
      # entrypoint (tests/run-tests-in-container.sh) + common.sh fall back to the
      # CONTAINERIZED-stack defaults (API_BASE_URL=http://api:4000,
      # SAML_SP_ENTITY_ID=http://client:3000/saml/sp, ACS/SLO=api:4000/samlacs),
      # which don't match the deployed bundle — so Keycloak's SAML client is
      # registered with the wrong entityID/ACS and the flow fails. All derive from
      # the same LIVE_DEBUGGER_BASE_URL the workflows set.
      - API_BASE_URL=${LIVE_DEBUGGER_BASE_URL:-https://test.idptools.com}
      # The SP entityID equals the AuthnRequest Issuer and must match the deployed
      # client bundle's baked spEntityId.
      - SAML_SP_ENTITY_ID=${LIVE_DEBUGGER_BASE_URL:-https://test.idptools.com}/saml/sp
      # Backendless: no server to receive the IdP's POST, so the ACS/SLO are the
      # static saml_response.html page (the client requests the Redirect binding so
      # the browser reads the response from the URL).
      - SAML_ACS_URL=${LIVE_DEBUGGER_BASE_URL:-https://test.idptools.com}/saml_response.html
      - SAML_SLO_URL=${LIVE_DEBUGGER_BASE_URL:-https://test.idptools.com}/saml_response.html
      # No API backend → run-report.js skips the HTTP-Artifact test (which needs
      # the server-side SOAP ArtifactResolve back-channel).
      - SAML_BACKEND_AVAILABLE=false
    # Persist the generated report/logs to the host (gitignored).
    volumes:
      - ./tests/report:/usr/src/app/report
    # Start-order only (host-networking healthchecks are unreliable); the test
    # runner waits for Keycloak to answer before configuring it.
    depends_on:
      - keycloak
